name: Export book to PDF + DOCX

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'tools/build-export.py'
      - '.github/workflows/export.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml weasyprint

      - name: Install pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pandoc \
            fonts-noto fonts-noto-color-emoji libpango-1.0-0 libpangoft2-1.0-0

      - name: Build combined book.md
        run: python tools/build-export.py

      - name: Show combined book size
        run: ls -lh _export/ && head -40 _export/book.md

      - name: Render DOCX
        run: |
          pandoc _export/book.md \
            --from gfm+yaml_metadata_block \
            --to docx \
            --toc --toc-depth=3 \
            -o _export/GenAI-Agentic-AI-Handbook.docx

      - name: Render PDF (WeasyPrint)
        run: |
          pandoc _export/book.md \
            --from gfm+yaml_metadata_block \
            --to html5 \
            --standalone \
            --toc --toc-depth=3 \
            --metadata title="GenAI & Agentic AI Handbook" \
            -o _export/book.html
          python - <<'PY'
          from weasyprint import HTML
          HTML('_export/book.html').write_pdf('_export/GenAI-Agentic-AI-Handbook.pdf')
          PY

      - name: Upload export artifact
        uses: actions/upload-artifact@v4
        with:
          name: handbook-export
          path: |
            _export/GenAI-Agentic-AI-Handbook.docx
            _export/GenAI-Agentic-AI-Handbook.pdf
          if-no-files-found: error
          retention-days: 90
